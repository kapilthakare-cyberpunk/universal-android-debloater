name: Build artifacts

on:
  workflow_dispatch:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.build_target }} [${{ matrix.graphics }}] [${{ matrix.update_feature }}]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        build_target: [linux, macos, windows]
        graphics: [glow, wgpu]
        update_feature: [self-update, no-self-update]
        exclude:
          - build_target: windows
            update_feature: no-self-update
        include:
          - build_target: linux
            os: ubuntu-latest
          - build_target: macos
            os: macos-latest
          - build_target: windows
            os: windows-latest
          - graphics: glow
            renderer: "-opengl"
          - graphics: wgpu
            renderer: ""
          - update_feature: self-update
            update_name: ""
          - update_feature: no-self-update
            update_name: "-noseflupdate"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.OS }}-release-

      - name: Build release
        run: cargo build --release --no-default-features --features ${{ matrix.graphics }},${{ matrix.update_feature }}

      - name: Create bin directory
        run: mkdir -p bin

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/release/uad_gui.exe bin/uad_gui-${{ matrix.build_target }}${{ matrix.renderer }}.exe

      - name: Rename binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/release/uad_gui bin/uad_gui${{ matrix.update_name }}-${{ matrix.build_target }}${{ matrix.renderer }}

      - name: Create tarball (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: tar -czf bin/uad_gui${{ matrix.update_name }}-${{ matrix.build_target }}${{ matrix.renderer }}.tar.gz -C bin uad_gui${{ matrix.update_name }}-${{ matrix.build_target }}${{ matrix.renderer }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uad_gui${{ matrix.update_name }}-${{ matrix.build_target }}${{ matrix.renderer }}
          path: bin/uad_gui-*
          retention-days: 14
